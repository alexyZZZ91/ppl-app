<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>PPL Split · Training Tracker</title>

<!-- PWA: manifest + theme colour -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#080b0f">

<!-- iOS PWA: install behaviour -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PPL Split">
<meta name="mobile-web-app-capable" content="yes">

<!-- iOS home screen icons (Safari ignores the manifest for these) -->
<link rel="apple-touch-icon" sizes="180x180" href="icons/icon-180.png">
<link rel="apple-touch-icon" sizes="167x167" href="icons/icon-167.png">
<link rel="apple-touch-icon" sizes="152x152" href="icons/icon-152.png">
<link rel="apple-touch-icon" sizes="120x120" href="icons/icon-120.png">
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap');

*{margin:0;padding:0;box-sizing:border-box;}

:root{
  --bg:#080b0f;
  --panel:#0d1117;
  --panel2:#141b24;
  --border:#1e2a38;
  --border2:#2a3a4e;
  --push:#ff4e3a;
  --pull:#3ab8ff;
  --legs:#ffe03a;
  --accent:#e8f04a;
  --white:#f0f4f8;
  --muted:#4a6070;
  --muted2:#2a3f52;
  --accent2:#4af0b8;
}

html {
  height: 100%;
  /* Prevent elastic overscroll on the root — the .main div handles its own scroll */
  overflow: hidden;
}

body{
  font-family:'DM Sans',sans-serif;
  background:var(--bg);
  color:var(--white);
  display:flex;
  flex-direction:column;
  /* Use dynamic viewport height so iOS bottom bar doesn't clip content */
  height: 100dvh;
  height: 100vh; /* fallback for older iOS */
  max-width:720px;
  margin:0 auto;
  overflow: hidden;
  /* Account for iOS home indicator at the bottom */
  padding-bottom: env(safe-area-inset-bottom);
}

/* ── HEADER ── */
.hdr{
  flex-shrink:0;
  /* env(safe-area-inset-top) pads below the iOS status bar / Dynamic Island */
  padding: calc(20px + env(safe-area-inset-top)) 24px 0;
  background:var(--panel);
  border-bottom:1px solid var(--border);
  position:sticky;
  top:0;
  z-index:50;
}

.hdr-top{
  display:flex;
  align-items:flex-end;
  gap:16px;
  margin-bottom:14px;
}

.hdr-logo{
  font-family:'Bebas Neue',sans-serif;
  font-size:40px;
  line-height:1;
  letter-spacing:3px;
  color:var(--white);
}

.hdr-logo span{color:var(--accent);}

.hdr-sub{
  font-family:'DM Mono',monospace;
  font-size:10px;
  color:var(--muted);
  letter-spacing:2px;
  text-transform:uppercase;
  padding-bottom:6px;
  line-height:1.5;
}

.hdr-right{
  margin-left:auto;
  text-align:right;
  padding-bottom:4px;
}

.week-prog{
  font-family:'Bebas Neue',sans-serif;
  font-size:30px;
  color:var(--accent);
  line-height:1;
}

.week-label{
  font-family:'DM Mono',monospace;
  font-size:9px;
  color:var(--muted);
  letter-spacing:2px;
  text-transform:uppercase;
}

.prog-rail{height:3px;background:var(--border);overflow:hidden;}

.prog-fill{
  height:100%;
  background:linear-gradient(90deg, var(--push), var(--accent), var(--pull));
  transition:width .5s cubic-bezier(.4,0,.2,1);
}

/* ── DAY TABS ── */
.day-strip{
  display:flex;
  background:var(--panel);
  border-bottom:2px solid var(--border);
  overflow-x:auto;
  scrollbar-width:none;
  flex-shrink:0;
}
.day-strip::-webkit-scrollbar{display:none;}

.day-btn{
  flex:1;
  min-width:78px;
  padding:14px 8px 12px;
  cursor:pointer;
  border:none;
  background:transparent;
  color:var(--muted);
  border-bottom:3px solid transparent;
  margin-bottom:-2px;
  transition:all .2s;
  text-align:center;
  position:relative;
}

.day-btn:hover{background:rgba(255,255,255,.03);}

.day-btn.push.active{color:var(--push);border-bottom-color:var(--push);}
.day-btn.pull.active{color:var(--pull);border-bottom-color:var(--pull);}
.day-btn.legs.active{color:var(--legs);border-bottom-color:var(--legs);}
.day-btn.hist.active{color:var(--accent2);border-bottom-color:var(--accent2);}
.day-btn.hist .d-dot{background:var(--accent2);}

.day-btn .d-num{
  font-family:'Bebas Neue',sans-serif;
  font-size:22px;
  line-height:1;
  display:block;
  letter-spacing:1px;
}

.day-btn .d-type{
  font-family:'DM Mono',monospace;
  font-size:8px;
  letter-spacing:2px;
  text-transform:uppercase;
  margin-top:2px;
  display:block;
}

.day-btn .d-dot{
  width:5px;height:5px;border-radius:50%;
  margin:4px auto 0;
  opacity:.4;
}

.day-btn.push .d-dot{background:var(--push);}
.day-btn.pull .d-dot{background:var(--pull);}
.day-btn.legs .d-dot{background:var(--legs);}
.day-btn.active .d-dot{opacity:1;}

.day-btn .done-pip{
  position:absolute;
  top:8px;right:8px;
  width:6px;height:6px;
  border-radius:50%;
  background:var(--accent);
  opacity:0;
  transition:opacity .3s;
}
.day-btn.completed .done-pip{opacity:1;}

/* ── MAIN ── */
.main{
  padding-bottom:40px;
  flex:1;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch; /* momentum scrolling on iOS */
}

/* ── DAY HERO ── */
.day-hero{
  padding:24px 24px 18px;
  position:relative;
  overflow:hidden;
  border-bottom:1px solid var(--border);
}

.hero-bg{
  position:absolute;
  top:-60px;right:-80px;
  width:320px;height:320px;
  border-radius:50%;
  background:radial-gradient(circle, var(--day-col), transparent 65%);
  opacity:.06;
  pointer-events:none;
}

.hero-tag{
  font-family:'DM Mono',monospace;
  font-size:9px;
  letter-spacing:3px;
  text-transform:uppercase;
  color:var(--day-col);
  margin-bottom:6px;
  display:flex;
  align-items:center;
  gap:10px;
}

.hero-tag::after{
  content:'';
  flex:1;
  max-width:50px;
  height:1px;
  background:var(--day-col);
  opacity:.3;
}

.hero-title{
  font-family:'Bebas Neue',sans-serif;
  font-size:54px;
  line-height:1;
  letter-spacing:3px;
  color:var(--white);
  margin-bottom:5px;
}

.hero-focus{
  font-size:12px;
  color:var(--muted);
  font-weight:300;
}

.hero-stats{
  display:flex;
  gap:8px;
  margin-top:16px;
  flex-wrap:wrap;
}

.hstat{
  text-align:center;
  background:var(--panel2);
  border:1px solid var(--border);
  border-radius:6px;
  padding:8px 14px;
  min-width:62px;
}

.hstat-val{
  font-family:'Bebas Neue',sans-serif;
  font-size:22px;
  line-height:1;
}

.hstat-lbl{
  font-family:'DM Mono',monospace;
  font-size:8px;
  color:var(--muted);
  letter-spacing:2px;
  text-transform:uppercase;
  margin-top:2px;
}

/* ── SECTION HEADERS ── */
.sec-head{
  display:flex;
  align-items:center;
  gap:12px;
  padding:0 24px;
  margin:22px 0 10px;
}

.sec-head-line{flex:1;height:1px;background:var(--border);}

.sec-head-text{
  font-family:'DM Mono',monospace;
  font-size:9px;
  letter-spacing:3px;
  text-transform:uppercase;
  color:var(--muted);
  white-space:nowrap;
}

/* ── EXERCISE CARDS ── */
.ex-list{padding:0 16px;}

.ex-card{
  display:flex;
  flex-wrap:wrap;
  align-items:stretch;
  margin-bottom:7px;
  border-radius:8px;
  overflow:hidden;
  border:1px solid var(--border);
  background:var(--panel);
  transition:border-color .2s, background .2s;
}

.ex-card-top{
  display:flex;
  align-items:stretch;
  width:100%;
}

.ex-card:hover{border-color:var(--border2);background:var(--panel2);}

.ex-card.done{
  border-color:rgba(232,240,74,.15);
  background:rgba(232,240,74,.025);
}

.ex-stripe{
  width:4px;
  flex-shrink:0;
  background:var(--day-col);
  opacity:.55;
  transition:opacity .2s;
}
.ex-card.done .ex-stripe{opacity:1;}

.ex-body{
  flex:1;
  padding:12px 14px;
}

.ex-name{
  font-family:'Bebas Neue',sans-serif;
  font-size:17px;
  letter-spacing:1px;
  color:var(--white);
  line-height:1.1;
  transition:color .2s;
}

.ex-card.done .ex-name{
  color:var(--muted);
  text-decoration:line-through;
  text-decoration-color:var(--muted2);
}

.ex-detail{
  font-size:11px;
  color:var(--muted);
  margin-top:3px;
  font-weight:300;
}

.ex-pills{
  display:flex;
  gap:6px;
  margin-top:6px;
}

.pill{
  font-family:'DM Mono',monospace;
  font-size:9px;
  letter-spacing:1px;
  text-transform:uppercase;
  padding:3px 8px;
  border-radius:3px;
}

.pill.sets{
  color:var(--day-col);
  border:1px solid var(--day-col);
  background:transparent;
  opacity:.8;
}

.pill.reps{
  color:var(--white);
  background:var(--panel2);
  border:1px solid var(--border2);
  opacity:.7;
}

.ex-check{
  width:52px;
  flex-shrink:0;
  display:flex;
  align-items:center;
  justify-content:center;
  border-left:1px solid var(--border);
  transition:background .2s;
}

.ex-card.done .ex-check{background:rgba(232,240,74,.05);}

.check-box{
  width:22px;height:22px;
  border-radius:5px;
  border:2px solid var(--border2);
  display:flex;align-items:center;justify-content:center;
  transition:all .25s cubic-bezier(.4,0,.2,1);
}

.ex-card.done .check-box{
  background:var(--accent);
  border-color:var(--accent);
}

/* ── STRETCH CARDS ── */
.str-list{padding:0 16px;}

.str-card{
  display:flex;
  align-items:center;
  gap:12px;
  padding:10px 14px;
  margin-bottom:6px;
  border-radius:8px;
  border:1px solid var(--border);
  background:var(--panel);
  cursor:pointer;
  transition:all .2s;
}

.str-card:hover{background:var(--panel2);}
.str-card.done{opacity:.4;}

.str-icon{font-size:18px;width:30px;text-align:center;flex-shrink:0;}

.str-info{flex:1;}

.str-name{
  font-size:13px;
  font-weight:500;
  transition:all .2s;
}

.str-card.done .str-name{
  text-decoration:line-through;
  color:var(--muted);
}

.str-dur{
  font-family:'DM Mono',monospace;
  font-size:10px;
  color:var(--muted);
  margin-top:2px;
  letter-spacing:1px;
}

.str-chk{
  width:18px;height:18px;
  border-radius:4px;
  border:1.5px solid var(--border2);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
  transition:all .2s;
  font-size:10px;
}

.str-card.done .str-chk{
  background:var(--accent2);
  border-color:var(--accent2);
  color:var(--bg);
}

.str-timer-btn{
  background:none;border:none;color:#6a8aaa;
  font-size:15px;cursor:pointer;padding:0 4px;
  opacity:0.85;transition:opacity .2s,color .2s;line-height:1;
  flex-shrink:0;
}
.str-timer-btn:hover,.str-timer-btn:active{opacity:1;color:var(--accent2);}

/* ── ONBOARDING ── */
#onboardingOverlay{
  position:fixed;inset:0;background:var(--bg);
  z-index:250;display:none;flex-direction:column;
  align-items:center;overflow-y:auto;
  padding:calc(48px + env(safe-area-inset-top)) 24px 48px;
}
.ob-wrap{width:100%;max-width:400px;display:flex;flex-direction:column;align-items:center;gap:0;}
.ob-logo{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:3px;color:var(--white);margin-bottom:28px;}
.ob-logo span{color:var(--accent);}
.ob-dots{display:flex;gap:6px;margin-bottom:28px;}
.ob-dot{width:8px;height:8px;border-radius:50%;background:var(--border2);transition:all .3s;}
.ob-dot.active{background:var(--accent);width:24px;border-radius:4px;}
.ob-dot.done{background:var(--accent2);}
.ob-title{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:2px;color:var(--white);text-align:center;margin-bottom:8px;}
.ob-sub{font-size:13px;color:var(--muted);text-align:center;margin-bottom:24px;line-height:1.5;}
.ob-cards{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;margin-bottom:28px;}
.ob-cards-3{grid-template-columns:1fr 1fr 1fr;}
.ob-card{background:var(--panel);border:1.5px solid var(--border);border-radius:10px;padding:16px 10px;
  display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;transition:all .2s;text-align:center;}
.ob-card:hover{border-color:var(--border2);}
.ob-card.selected{border-color:var(--accent);background:rgba(232,240,74,.07);}
.ob-card-icon{font-size:24px;}
.ob-card-label{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:1px;color:var(--white);text-transform:uppercase;}
.ob-card-desc{font-size:10px;color:var(--muted);margin-top:2px;}
.ob-pills{display:flex;gap:10px;margin-bottom:28px;}
.ob-pill{background:var(--panel);border:1.5px solid var(--border);border-radius:8px;
  font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:1px;color:var(--muted);
  width:64px;height:64px;cursor:pointer;transition:all .2s;}
.ob-pill:hover{border-color:var(--border2);color:var(--white);}
.ob-pill.selected{border-color:var(--accent);color:var(--accent);background:rgba(232,240,74,.07);}
.ob-checks{display:flex;flex-direction:column;gap:8px;width:100%;margin-bottom:28px;}
.ob-check-item{display:flex;align-items:center;gap:12px;background:var(--panel);border:1.5px solid var(--border);
  border-radius:8px;padding:12px 14px;cursor:pointer;transition:all .2s;text-align:left;}
.ob-check-item.selected{border-color:var(--accent2);background:rgba(74,240,184,.06);}
.ob-check-box{width:18px;height:18px;border-radius:4px;border:1.5px solid var(--border2);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:10px;transition:all .2s;}
.ob-check-item.selected .ob-check-box{background:var(--accent2);border-color:var(--accent2);color:var(--bg);}
.ob-check-label{font-size:13px;font-weight:500;color:var(--white);}
.ob-nav{display:flex;justify-content:space-between;align-items:center;width:100%;gap:12px;margin-top:4px;}
.ob-btn-next{background:var(--accent);color:#000;font-family:'DM Mono',monospace;font-size:11px;
  font-weight:700;letter-spacing:1.5px;padding:12px 24px;border:none;border-radius:8px;cursor:pointer;flex:1;}
.ob-btn-next:hover{opacity:.85;}
.ob-btn-next.disabled{opacity:.35;cursor:not-allowed;}
.ob-btn-back{background:none;border:1px solid var(--border2);color:var(--muted);font-family:'DM Mono',monospace;
  font-size:10px;letter-spacing:1px;padding:12px 16px;border-radius:8px;cursor:pointer;white-space:nowrap;}
.ob-btn-back:hover{color:var(--white);}
.ob-load-title{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:2px;color:var(--white);text-align:center;margin-bottom:8px;}
.ob-load-sub{font-size:13px;color:var(--muted);text-align:center;line-height:1.6;max-width:300px;}
.ob-other-input{
  width:100%;background:var(--panel);border:1.5px solid var(--border2);
  border-radius:8px;padding:12px 14px;color:var(--white);
  font-family:'DM Mono',monospace;font-size:12px;outline:none;margin-top:8px;
  transition:border-color .2s;
}
.ob-other-input:focus{border-color:var(--accent);}
.ob-other-input::placeholder{color:var(--muted2);}
.ob-spinner{width:48px;height:48px;border:3px solid var(--border2);border-top-color:var(--accent);
  border-radius:50%;animation:spin 0.8s linear infinite;margin:28px auto;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ── RECOVERY ── */
.rec-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  padding:0 16px;
  margin-bottom:20px;
}

.rec-card{
  border-radius:10px;
  padding:16px;
}

.rec-card.cold{
  background:linear-gradient(135deg,#0a1a2e,#0d2340);
  border:1px solid #1a3a5e;
}

.rec-card.heat{
  background:linear-gradient(135deg,#1a0a00,#2a1200);
  border:1px solid #3a1e00;
}

.rec-card-icon{font-size:22px;margin-bottom:8px;}

.rec-card-title{
  font-family:'Bebas Neue',sans-serif;
  font-size:18px;
  letter-spacing:2px;
  margin-bottom:6px;
}

.rec-card.cold .rec-card-title{color:#5acdff;}
.rec-card.heat .rec-card-title{color:#ff8c3a;}

.rec-card-text{
  font-size:11px;
  color:var(--muted);
  line-height:1.5;
  font-weight:300;
}

.rec-card-stat{
  margin-top:10px;
  font-family:'DM Mono',monospace;
  font-size:10px;
  letter-spacing:1px;
  padding:4px 8px;
  border-radius:4px;
  display:inline-block;
}

.rec-card.cold .rec-card-stat{background:rgba(90,205,255,.1);color:#5acdff;}
.rec-card.heat .rec-card-stat{background:rgba(255,140,58,.1);color:#ff8c3a;}

/* ── WIN BANNER ── */
.win-banner{
  margin:0 16px 16px;
  padding:20px;
  border-radius:12px;
  background:linear-gradient(135deg,rgba(232,240,74,.08),rgba(74,240,184,.08));
  border:1px solid rgba(232,240,74,.25);
  text-align:center;
  display:none;
}

.win-banner.show{display:block;}

.win-banner h3{
  font-family:'Bebas Neue',sans-serif;
  font-size:26px;
  letter-spacing:3px;
  color:var(--accent);
  margin-bottom:4px;
}

.win-banner p{font-size:12px;color:var(--muted);}

/* ── SET LOGGER ── */
.set-logger{
  width:100%;
  border-top:1px solid var(--border);
  padding:10px 14px 12px;
  background:rgba(0,0,0,.15);
}

.set-rows{
  display:flex;
  flex-direction:column;
  gap:6px;
  margin-bottom:8px;
}

.set-row{
  display:flex;
  align-items:center;
  gap:8px;
}

.set-label{
  font-family:'DM Mono',monospace;
  font-size:8px;
  letter-spacing:2px;
  text-transform:uppercase;
  color:#5a7a96;
  width:36px;
  flex-shrink:0;
}

.set-input{
  font-family:'DM Mono',monospace;
  font-size:14px;
  font-weight:500;
  color:var(--white);
  background:#1c2a3a;
  border:1px solid #3a526e;
  border-radius:5px;
  padding:5px 8px;
  width:70px;
  text-align:right;
  outline:none;
  transition:border-color .2s;
  -moz-appearance:textfield;
}

.set-input::-webkit-outer-spin-button,
.set-input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}

.set-input:focus{border-color:var(--day-col,var(--accent));}
.set-input::placeholder{color:#3d5570;font-size:11px;}

.set-unit{
  font-family:'DM Mono',monospace;
  font-size:9px;
  color:#5a7a96;
  letter-spacing:1px;
}

.set-x{
  font-family:'DM Mono',monospace;
  font-size:10px;
  color:var(--muted2);
  margin:0 1px;
}

.set-rest-btn{
  background:none;border:none;color:#6a8aaa;
  font-size:15px;cursor:pointer;padding:0 2px;
  opacity:0.85;transition:opacity .2s,color .2s;line-height:1;
  flex-shrink:0;
}
.set-rest-btn:hover,.set-rest-btn:active{opacity:1;color:var(--accent);}

/* ── REST TIMER OVERLAY ── */
#restTimerOverlay{
  position:fixed;bottom:0;left:0;right:0;
  background:var(--card);
  border-top:1px solid var(--border2);
  border-radius:20px 20px 0 0;
  padding:20px 24px 32px;
  transform:translateY(100%);
  transition:transform .35s cubic-bezier(.32,1,.32,1);
  z-index:300;
  display:flex;flex-direction:column;align-items:center;gap:16px;
}
#restTimerOverlay.active{transform:translateY(0);}
.rest-lbl{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--muted2);}
.rest-ring{position:relative;width:130px;height:130px;}

  try{ localStorage.setItem('ppl_v4_cache_'+(_currentUser?.id||'guest'), JSON.stringify(data)); }catch(e){}
  // Debounce cloud write by 1.5s
  if(!_currentUser) return;
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(()=>{
    _sb.from('workout_data').upsert(
      { user_id:_currentUser.id, data, updated_at:new Date().toISOString() },
      { onConflict:'user_id' }
    );
  }, 1500);
}

async function doEmailAuth(){

/* ── REST TIMER ── */
const REST_CIRC = +(2*Math.PI*54).toFixed(2);
let _restSecs = 90, _restTotal = 90, _restTick = null;

function parseDur(dur){
  const m = dur.match(/(\d+)s/);
  return m ? parseInt(m[1]) : null;
}

function startRestTimer(secs, label, sub){
  if(_restTick){ clearInterval(_restTick); _restTick=null; }
  if(secs) _restSecs = secs;
  _restTotal = _restSecs;
  document.getElementById('restTimerLabel').textContent = label || 'REST TIMER';
  document.getElementById('restTimerSub').textContent = sub || '';
  _updateRestUI();
  document.getElementById('restTimerOverlay').classList.add('active');
  _restTick = setInterval(()=>{
    _restSecs--;
    _updateRestUI();
    if(_restSecs<=0){ clearInterval(_restTick); _restTick=null; _restDone(); }
  },1000);
}

function _updateRestUI(){
  const m=Math.floor(_restSecs/60), s=_restSecs%60;
  document.getElementById('restDisplay').textContent=`${m}:${String(s).padStart(2,'0')}`;
  const arc=document.getElementById('restArc');
  const progress=Math.max(0,_restSecs/_restTotal);
  arc.style.strokeDashoffset=REST_CIRC*(1-progress);
  arc.style.stroke=_restSecs<=10?'var(--push)':_restSecs<=30?'#f0a500':'var(--accent)';
}

function adjustRest(delta){
  _restSecs=Math.max(5,_restSecs+delta);
  if(_restSecs>_restTotal) _restTotal=_restSecs;
  _updateRestUI();
}

function skipRest(){
  if(_restTick){ clearInterval(_restTick); _restTick=null; }
  _restSecs=90; _restTotal=90;
  document.getElementById('restTimerOverlay').classList.remove('active');
}

function _restDone(){
  document.getElementById('restTimerOverlay').classList.remove('active');
  _restSecs=90; _restTotal=90;
  if(navigator.vibrate) navigator.vibrate([150,80,150,80,300]);
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    [880,1100,880].forEach((freq,i)=>{
      const osc=ctx.createOscillator(), g=ctx.createGain();
      osc.connect(g); g.connect(ctx.destination);
      osc.frequency.value=freq; osc.type='sine';
      const t=ctx.currentTime+i*0.18;
      g.gain.setValueAtTime(0.25,t);
      g.gain.exponentialRampToValueAtTime(0.001,t+0.15);
      osc.start(t); osc.stop(t+0.15);
    });
  }catch(e){}
}

function showOnboarding(){
  _ob = { step:0, experience:null, equipment:null, goal:null, daysPerWeek:6, injuries:[], otherInjury:'' };
  document.getElementById('onboardingOverlay').style.display='flex';
  _renderObStep();
}
function hideOnboarding(){ document.getElementById('onboardingOverlay').style.display='none'; }

function _renderObStep(){
  const cfg = OB_STEPS[_ob.step];
  const total = OB_STEPS.length;
  const dots = OB_STEPS.map((_,i)=>`<div class="ob-dot ${i===_ob.step?'active':i<_ob.step?'done':''}"></div>`).join('');

  let optHTML = '';
  if(cfg.type==='card'){
    const cols = cfg.options.length<=3 ? 'ob-cards-3' : '';
    optHTML = `<div class="ob-cards ${cols}">`+cfg.options.map(o=>{
      const sel = _ob[cfg.key]===o.value;
      return `<button class="ob-card${sel?' selected':''}" onclick="obSelect('${cfg.key}','${o.value.replace(/'/g,'&#39;')}')">
        <div class="ob-card-icon">${o.icon}</div>
        <div class="ob-card-label">${o.label}</div>
        ${o.desc?`<div class="ob-card-desc">${o.desc}</div>`:''}
      </button>`;
    }).join('')+`</div>`;
  } else if(cfg.type==='pill'){
    optHTML = `<div class="ob-pills">`+cfg.options.map(o=>{
      const sel = _ob[cfg.key]===o.value;
      return `<button class="ob-pill${sel?' selected':''}" onclick="obSelect('${cfg.key}',${o.value})">${o.label}</button>`;
    }).join('')+`</div>`;
  } else {
    optHTML = `<div class="ob-checks">`+cfg.options.map(o=>{
      const sel = _ob.injuries.includes(o.value);
      return `<button class="ob-check-item${sel?' selected':''}" onclick="obToggleInjury('${o.value}')">
        <div class="ob-check-box">${sel?'✓':''}</div>
        <div class="ob-check-label">${o.label}</div>
      </button>`;
    }).join('')+
    `<input id="obOtherInput" type="text" class="ob-other-input"
       placeholder="Other limitations e.g. hip flexor, wrist pain…"
       value="${_ob.otherInjury.replace(/"/g,'&quot;')}"
       oninput="_ob.otherInjury=this.value">
    </div>`;
  }

  const isLast = _ob.step===total-1;
  const canNext = cfg.type==='check' || _ob[cfg.key]!==null;
  const backBtn = _ob.step>0 ? `<button class="ob-btn-back" onclick="obBack()">← Back</button>` : '<div></div>';

  document.getElementById('onboardingOverlay').innerHTML = `
    <div class="ob-wrap">
      <div class="ob-logo">PPL<span>·</span>SPLIT</div>
      <div class="ob-dots">${dots}</div>
      <div class="ob-title">${cfg.title}</div>
      <div class="ob-sub">${cfg.sub}</div>
      ${optHTML}
      <div class="ob-nav">
        ${backBtn}
        <button class="ob-btn-next${canNext?'':' disabled'}" onclick="obNext()" ${canNext?'':'disabled'}>
          ${isLast?'Generate My Plan →':'Next →'}
        </button>
      </div>
    </div>`;
}

function obSelect(key, val){
  _ob[key]=val;
  _renderObStep();
}

function obToggleInjury(val){
  if(val==='None'){ _ob.injuries = _ob.injuries.includes('None') ? [] : ['None']; }
  else {
    _ob.injuries = _ob.injuries.filter(i=>i!=='None');
    _ob.injuries.includes(val) ? (_ob.injuries=_ob.injuries.filter(i=>i!==val)) : _ob.injuries.push(val);
  }
  _renderObStep();
}

function obBack(){ if(_ob.step>0){ _ob.step--; _renderObStep(); } }

async function obNext(){
  const cfg = OB_STEPS[_ob.step];
  if(cfg.type!=='check' && _ob[cfg.key]===null) return;
  if(_ob.step < OB_STEPS.length-1){ _ob.step++; _renderObStep(); }
  else await obGenerate();
}

async function obGenerate(){
  document.getElementById('onboardingOverlay').innerHTML = `
    <div class="ob-wrap" style="justify-content:center;min-height:80vh;">
      <div class="ob-logo">PPL<span>·</span>SPLIT</div>
      <div class="ob-spinner"></div>
      <div class="ob-load-title">Building Your Plan</div>
      <div class="ob-load-sub">Claude is generating a personalised programme based on your profile…</div>
    </div>`;
  try{
    const { data:{ session } } = await _sb.auth.getSession();
    const baseInjuries = _ob.injuries.includes('None') ? [] : _ob.injuries.filter(i=>i!=='None');
    if(_ob.otherInjury.trim()) baseInjuries.push(_ob.otherInjury.trim());
    const res = await fetch(EDGE_FN,{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+session.access_token},
      body: JSON.stringify({
        experience: _ob.experience,
        equipment:  _ob.equipment,
        goal:       _ob.goal,
        daysPerWeek:_ob.daysPerWeek,
        injuries:   baseInjuries,
      }),
    });
    const json = await res.json();
    if(!res.ok||json.error) throw new Error(json.error||'Generation failed');
    const plan = json.plan;
    // Insert profile row; if it already exists, update instead
    const profileData = {
      user_id:_currentUser.id,
      experience:_ob.experience, equipment:_ob.equipment,
      goal:_ob.goal, days_per_week:_ob.daysPerWeek,
      injuries:baseInjuries, plan,
    };
    const { error: insertErr } = await _sb.from('user_profiles').insert(profileData);
    if(insertErr){
      // Row exists — update it directly
      const { error: updateErr } = await _sb.from('user_profiles').update({
        experience:_ob.experience, equipment:_ob.equipment,
        goal:_ob.goal, days_per_week:_ob.daysPerWeek,
        injuries:baseInjuries, plan,
      }).eq('user_id',_currentUser.id);
      if(updateErr) throw new Error(updateErr.message);
    }
    DAYS = plan;
    hideOnboarding();
    await _finishSignIn(_currentUser);
  }catch(err){
    document.getElementById('onboardingOverlay').innerHTML = `
      <div class="ob-wrap" style="justify-content:center;min-height:80vh;">
        <div class="ob-logo">PPL<span>·</span>SPLIT</div>
        <div style="font-size:40px;margin:20px 0">⚠️</div>
        <div class="ob-load-title">Something went wrong</div>
        <div class="ob-load-sub" style="margin-bottom:24px">${err.message}</div>
        <div style="display:flex;flex-direction:column;gap:10px;width:100%;">
          <button class="ob-btn-next" style="flex:none" onclick="obGenerate()">Try Again</button>
          <button class="ob-btn-back" onclick="_ob.step=4;_renderObStep()">← Go Back</button>
        </div>
      </div>`;
  }
}

function getLastSession(dayId, exIndex){
  const today = getToday();
  const dates = Object.keys(appData.sessions).sort().reverse();
  for(const date of dates){
    if(date >= today) continue;
    const dayData = appData.sessions[date]?.[dayId]?.[exIndex];
    if(dayData && dayData.some(s => s.wt || s.reps)){
      return { date, sets: dayData };
    }
  }
  return null;
}

function getTodaySets(dayId, exIndex){
  return appData.sessions[getToday()]?.[dayId]?.[exIndex] || null;
}

function logSet(dayId, exIndex, setIndex, wt, reps){
  const today = getToday();
  if(!appData.sessions[today]) appData.sessions[today] = {};
  if(!appData.sessions[today][dayId]) appData.sessions[today][dayId] = {};
  if(!appData.sessions[today][dayId][exIndex]) appData.sessions[today][dayId][exIndex] = [];
  appData.sessions[today][dayId][exIndex][setIndex] = { wt, reps };
  saveData(appData);
}

function clearTodaySession(dayId){
  const today = getToday();
  if(appData.sessions[today]?.[dayId]){
    delete appData.sessions[today][dayId];
    if(Object.keys(appData.sessions[today]).length === 0){
      delete appData.sessions[today];
    }
    saveData(appData);
  }
}

function formatDate(iso){
  const [y,m,d] = iso.split('-');
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${months[parseInt(m)-1]} ${parseInt(d)}`;
}

function isDayLocked(dayId){
  const today = getToday();
  return !!(appData.sessions[today]?.[dayId]?._completed);
}

function completeDay(dayId){
  // Just stamp the completed flag — checkboxes stay exactly as they are
  const today = getToday();
  if(!appData.sessions[today]) appData.sessions[today] = {};
  if(!appData.sessions[today][dayId]) appData.sessions[today][dayId] = {};
  appData.sessions[today][dayId]._completed = new Date().toISOString();
  saveData(appData);
  renderDay(); renderTabs(); updateProg();
}

function updateProg(){
  let total=0,done=0;
  DAYS.forEach(d=>{
    d.exercises.forEach((_,i)=>{ total++; if(appData.checked[`e_${d.id}_${i}`]) done++; });
    d.stretches.forEach((_,i)=>{ total++; if(appData.checked[`s_${d.id}_${i}`]) done++; });
  });
  const pct = total ? Math.round(done/total*100) : 0;
  document.getElementById('progFill').style.width = pct+'%';
  document.getElementById('progPct').textContent = pct+'%';
}

function getDayTypeForSession(sessionDayData){
  // sessionDayData is the object keyed by dayId for one date
  const ids = Object.keys(sessionDayData).filter(k=>k!=='_completed'&&!isNaN(k));
  if(!ids.length) return null;
  // pick the dayId with the most data
  const id = parseInt(ids[0]);
  return DAYS[id] || null;
}

function getSessionSummary(date){
  // Returns array of {day, checked, total, setsLogged, completed}
  const dateData = appData.sessions[date] || {};
  const results = [];
  for(const dayId of Object.keys(dateData)){
    if(isNaN(dayId)) continue;
    const id = parseInt(dayId);
    const d = DAYS[id];
    if(!d) continue;
    const exCount = d.exercises.length;
    let checked = 0;
    d.exercises.forEach((_,i)=>{ if(appData.checked[`e_${id}_${i}`]) checked++; });
    // count checked from history — we store checked in appData.checked globally (not per-date)
    // so for history we use the session's _completed flag and set data presence
    const exData = dateData[dayId];
    let setsLogged = 0;
    for(let i=0;i<exCount;i++){
      const sets = exData[i];
      if(sets && Array.isArray(sets)) setsLogged += sets.filter(s=>s&&(s.wt||s.reps)).length;
    }
    results.push({
      day:d, dayId:id,
      setsLogged,
      completed:!!exData._completed,
      completedAt: exData._completed || null
    });
  }
  return results;
}

function renderCalendar(){
  const months=['January','February','March','April','May','June',
                'July','August','September','October','November','December'];
  const today = getToday();
  const firstDay = new Date(calYear, calMonth, 1).getDay(); // 0=Sun
  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();

  // Build a map of date→{type, completed} for trained days this month
  const trainedMap = {};
  for(const date of Object.keys(appData.sessions)){
    const [y,m] = date.split('-').map(Number);
    if(y!==calYear || m-1!==calMonth) continue;
    const summaries = getSessionSummary(date);
    if(!summaries.length) continue;
    // determine colour from day types trained
    const types = [...new Set(summaries.map(s=>s.day.type))];
    const type = types.length>1 ? 'multi' : types[0];
    const completed = summaries.every(s=>s.completed);
    trainedMap[date] = {type, completed};
  }

  const dayLabels = ['Su','Mo','Tu','We','Th','Fr','Sa'];
  let html = `<div class="cal-section">
    <div class="cal-header">
      <div class="cal-title">${months[calMonth]} ${calYear}</div>
      <div class="cal-nav">
        <button class="cal-nav-btn" onclick="calNav(-1)">‹</button>
        <button class="cal-nav-btn" onclick="calNav(1)">›</button>
      </div>
    </div>
    <div class="cal-grid">`;
  dayLabels.forEach(l=>{ html+=`<div class="cal-day-label">${l}</div>`; });
  // Empty cells before month starts
  for(let i=0;i<firstDay;i++) html+=`<div class="cal-cell"></div>`;
  for(let day=1;day<=daysInMonth;day++){
    const dateStr = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const isToday = dateStr===today;
    const info = trainedMap[dateStr];
    let cls = 'cal-cell';
    if(isToday) cls+=' today';
    if(info){ cls+=` trained ${info.type}`; if(info.completed) cls+=' completed-day'; }
    const onclick = info ? `onclick="calDayClick('${dateStr}')"` : '';
    html+=`<div class="${cls}" ${onclick}>${day}${info?'<span class="cal-dot"></span>':''}</div>`;
  }
  html+=`</div></div>`;
  return html;
}

function renderSessionList(){
  const dates = Object.keys(appData.sessions).sort().reverse();
  if(!dates.length) return `<div class="hist-empty">NO SESSIONS YET<br>COMPLETE A WORKOUT TO SEE YOUR LOG</div>`;

  let html = `<div class="sess-section"><div class="sess-section-title">Session Log</div>`;
  for(const date of dates){
    const summaries = getSessionSummary(date);
    if(!summaries.length) continue;
    for(const s of summaries){
      const d = s.day;
      const typeCol = `var(--${d.type})`;
      const dateData = appData.sessions[date]?.[s.dayId] || {};

      // Build exercise rows for detail view
      let exRows = '';
      d.exercises.forEach((e,i)=>{
        // For history: "done" means sets were logged OR it was the active day when completed
        const sets = dateData[i];
        const hasData = sets && Array.isArray(sets) && sets.some(s=>s&&(s.wt||s.reps));
        const setPills = hasData
          ? sets.filter(s=>s&&(s.wt||s.reps)).map((s,si)=>`<span class="sess-ex-set-pill">S${si+1} ${s.wt||'?'}kg×${s.reps||'?'}</span>`).join('')
          : '<span style="font-family:DM Mono,monospace;font-size:9px;color:var(--muted2)">no data logged</span>';
        exRows += `<div class="sess-ex-row">
          <div class="sess-ex-check" style="color:${typeCol}">${hasData?'●':'○'}</div>
          <div class="sess-ex-info">
            <div class="sess-ex-name${hasData?'':' skipped'}">${e.name}</div>
            <div class="sess-ex-sets">${setPills}</div>
          </div>
        </div>`;
      });

      html+=`<div class="sess-card" id="sess-${date}-${s.dayId}" onclick="toggleSessCard('${date}',${s.dayId})">
        <div class="sess-card-head">
          <div class="sess-date-col">
            <div class="sess-date">${formatDate(date)}</div>
            <div class="sess-day-name ${d.type}">${d.name}</div>
          </div>

            <div class="sess-stat">
              <div class="sess-stat-val" style="color:${typeCol}">${s.setsLogged}</div>
              <div class="sess-stat-lbl">Sets</div>
            </div>
            ${s.completed?`<span class="sess-locked-badge">✓ Done</span>`:''}
          </div>
          <div class="sess-chevron">›</div>
        </div>
        <div class="sess-detail">${exRows}</div>
      </div>`;
    }
  }
  html+=`</div>`;
  return html;
}

function renderExerciseProgress(){
  // Build flat list of all exercises across all days
  const allEx = [];
  DAYS.forEach(d=>d.exercises.forEach((e,i)=>allEx.push({key:`${d.id}_${i}`,name:e.name,dayName:d.name,type:d.type})));

  if(!progExKey) progExKey = allEx[0].key;

  const options = allEx.map(e=>`<option value="${e.key}" ${e.key===progExKey?'selected':''}>${e.dayName} · ${e.name}</option>`).join('');

  // Find all sessions that have data for this exercise
  const [dayId,exIndex] = progExKey.split('_').map(Number);
  const rows = [];
  for(const date of Object.keys(appData.sessions).sort().reverse()){
    const sets = appData.sessions[date]?.[dayId]?.[exIndex];
    if(!sets || !Array.isArray(sets) || !sets.some(s=>s&&(s.wt||s.reps))) continue;
    // find best set (highest wt)
    const validSets = sets.filter(s=>s&&(s.wt||s.reps));
    const bestIdx = validSets.reduce((bi,s,i)=>(s.wt||0)>(validSets[bi]?.wt||0)?i:bi, 0);
    rows.push({date, sets:validSets, bestIdx});
  }

  const tableRows = rows.length ? rows.map(r=>{
    const chips = r.sets.map((s,i)=>`<span class="prog-set-chip${i===r.bestIdx?' prog-best':''}">${s.wt||'?'}kg×${s.reps||'?'}</span>`).join('');
    return `<tr><td>${formatDate(r.date)}</td><td>${chips}</td></tr>`;
  }).join('') : `<tr><td colspan="2" style="color:var(--muted2);padding-top:12px;font-size:10px;letter-spacing:1px;">NO DATA FOR THIS EXERCISE YET</td></tr>`;

  return `<div class="ex-prog-section">
    <div class="ex-prog-title">Exercise Progress</div>
    <select class="ex-prog-select" onchange="progExKey=this.value;renderHist()">
      ${options}
    </select>
    <table class="ex-prog-table">
      <thead><tr><th>Date</th><th>Sets &nbsp;<span style="color:var(--accent2);font-size:7px">● = best set</span></th></tr></thead>
      <tbody>${tableRows}</tbody>
    </table>
  </div>`;
}

function buildSetLogger(dayId, exIndex, numSets, locked){
  const todaySets = getTodaySets(dayId, exIndex) || [];
  const lastSess  = getLastSession(dayId, exIndex);
  const dis = locked ? 'disabled' : '';

  let rowsHTML = '';
  for(let s=0; s<numSets; s++){
    const wt   = todaySets[s]?.wt   ?? '';
    const reps = todaySets[s]?.reps ?? '';
    rowsHTML += `
      <div class="set-row">
        <span class="set-label">S${s+1}</span>
        <input class="set-input" type="number" inputmode="decimal" min="0" step="0.5"
               placeholder="—" value="${wt}" ${dis}
               onchange="handleSetInput(${dayId},${exIndex},${s},this)"
               onclick="event.stopPropagation()">
        <span class="set-unit">kg</span>
        <span class="set-x">×</span>
        <input class="set-input" type="number" inputmode="numeric" min="0" step="1"
               placeholder="—" value="${reps}" ${dis}
               onchange="handleSetInput(${dayId},${exIndex},${s},this)"
               onclick="event.stopPropagation()">
        <span class="set-unit">reps</span>
        ${locked?'':'<button class="set-rest-btn" onclick="startRestTimer();event.stopPropagation()" title="Rest timer">⏱</button>'}
      </div>`;
  }

  let lastHTML = '';
  if(lastSess){
    const pills = lastSess.sets
      .filter(s => s && (s.wt || s.reps))
      .map((s,i)=>`<span class="last-sess-set">S${i+1} ${s.wt||'?'}kg×${s.reps||'?'}</span>`).join('');
    if(pills){
      lastHTML = `
        <div class="last-sess">
          <div class="last-sess-label">Last session <span class="last-sess-date">${formatDate(lastSess.date)}</span></div>
          <div class="last-sess-sets">${pills}</div>
        </div>`;
    }
  }

  return `<div class="set-logger${locked?' locked-logger':''}" onclick="event.stopPropagation()"><div class="set-rows">${rowsHTML}</div>${lastHTML}</div>`;
}

function handleSetInput(dayId, exIndex, setIndex, changedEl){
  const row  = changedEl.closest('.set-row');
  const inputs = row.querySelectorAll('.set-input');
  const wt   = parseFloat(inputs[0].value) || 0;
  const reps = parseInt(inputs[1].value)   || 0;
  logSet(dayId, exIndex, setIndex, wt, reps);
}

function resetDay(id){
  DAYS[id].exercises.forEach((_,i)=>delete appData.checked[`e_${id}_${i}`]);
  DAYS[id].stretches.forEach((_,i)=>delete appData.checked[`s_${id}_${i}`]);
  // Remove completed flag but keep session weight/reps data on reset
  const today = getToday();
  if(appData.sessions[today]?.[id]?._completed){
    delete appData.sessions[today][id]._completed;
    saveData(appData);
  }
  clearTodaySession(id);
  renderDay(); renderTabs(); updateProg();
}

@keyframes slideUp{from{transform:translateY(20px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.ios-install-icon{font-size:22px;flex-shrink:0;}
.ios-install-text{flex:1;font-size:12px;color:var(--white);line-height:1.5;}
.ios-install-text strong{color:var(--accent);display:block;margin-bottom:2px;font-size:13px;}
.ios-install-close{
  background:none;border:none;color:var(--muted);font-size:20px;
  cursor:pointer;padding:0 4px;line-height:1;flex-shrink:0;
}
</style>
<script>
(function(){
  // ── ONBOARDING OVERLAY ──
  (function(){
    const ob = document.createElement('div');
    ob.id = 'onboardingOverlay';
    document.body.appendChild(ob);
  })();

  // ── REST TIMER OVERLAY HTML ──
  (function(){
    const el = document.createElement('div');
    el.id = 'restTimerOverlay';
    const r = 54, circ = +(2*Math.PI*r).toFixed(2);
    el.innerHTML = `
      <div id="restTimerLabel" class="rest-lbl">REST TIMER</div>
      <div id="restTimerSub" class="rest-lbl" style="margin-top:-10px;font-size:8px;opacity:0.6;min-height:10px;"></div>
      <div class="rest-ring">
        <svg width="130" height="130" viewBox="0 0 130 130">
          <circle class="rest-ring-bg" cx="65" cy="65" r="${r}"/>
          <circle id="restArc" class="rest-ring-arc" cx="65" cy="65" r="${r}"
                  stroke-dasharray="${circ}" stroke-dashoffset="0"/>
        </svg>
        <div id="restDisplay" class="rest-ring-time">1:30</div>
      </div>
      <div class="rest-controls">
        <button class="rest-adj" onclick="adjustRest(-30)">−30s</button>
        <button class="rest-skip" onclick="skipRest()">SKIP</button>
        <button class="rest-adj" onclick="adjustRest(+30)">+30s</button>
      </div>`;
    document.body.appendChild(el);
  })();

  const isIos = /iphone|ipad|ipod/i.test(navigator.userAgent);
  const isStandalone = ('standalone' in navigator) && navigator.standalone;
  const dismissed = localStorage.getItem('ppl_install_dismissed');
  if (!isIos || isStandalone || dismissed) return;

  const banner = document.createElement('div');
  banner.className = 'ios-install-banner';
  banner.innerHTML = `
    <span class="ios-install-icon">📲</span>
    <span class="ios-install-text">
      <strong>Install as App</strong>
      Tap <strong style="color:var(--pull)">Share ↑</strong> then
      <strong style="color:var(--pull)">Add to Home Screen</strong> for the full experience — offline &amp; full-screen.
    </span>
    <button class="ios-install-close" onclick="this.closest('.ios-install-banner').remove(); localStorage.setItem('ppl_install_dismissed','1')">×</button>
  `;
  document.body.appendChild(banner);
})();
</script>
</body>
</html>
